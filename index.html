<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Split Expenses</title>
<style>
  :root {
    --bg-color: #000000;
    --surface: #1c1c1e;
    --primary: #0a84ff;
    --danger: #ff453a;
    --text-main: #ffffff;
    --text-muted: #8e8e93;
    --border: #2c2c2e;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    background-color: var(--bg-color);
    color: var(--text-main);
    padding: 16px;
    padding-bottom: 40px;
    min-height: 100vh;
  }

  .container {
    max-width: 500px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    margin-bottom: 24px;
    padding-top: 12px;
  }

  h1 {
    font-size: 1.8rem;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .subtitle {
    color: var(--text-muted);
    font-size: 0.95rem;
    margin-top: 4px;
  }

  /* Balance Card */
  .balance-section {
    background: linear-gradient(145deg, #1c1c1e 0%, #2c2c2e 100%);
    border-radius: 20px;
    padding: 24px 20px;
    margin-bottom: 24px;
    text-align: center;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }

  .balance-title {
    color: var(--text-muted);
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 600;
    margin-bottom: 8px;
  }

  .balance-amount {
    font-size: 2.5rem;
    font-weight: 700;
    margin-bottom: 4px;
    letter-spacing: -1px;
  }

  .balance-detail {
    color: var(--primary);
    font-size: 1rem;
    font-weight: 500;
  }

  /* Form Section */
  .form-section {
    background-color: var(--surface);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 32px;
  }

  .form-group {
    margin-bottom: 16px;
  }

  label {
    display: block;
    margin-bottom: 8px;
    color: var(--text-muted);
    font-size: 0.9rem;
    font-weight: 500;
    padding-left: 4px;
  }

  input, select {
    width: 100%;
    padding: 16px;
    background-color: #000000;
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text-main);
    font-size: 1.1rem;
    appearance: none;
  }

  input:focus, select:focus {
    outline: none;
    border-color: var(--primary);
  }

  .btn {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 12px;
    font-size: 1.1rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .btn:active {
    opacity: 0.7;
  }

  .btn-primary {
    background-color: var(--primary);
    color: #fff;
    margin-top: 8px;
  }

  /* Transactions List */
  .section-title {
    font-size: 1.2rem;
    font-weight: 600;
    margin-bottom: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 4px;
  }

  .btn-clear {
    background: none;
    border: none;
    color: var(--danger);
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
  }

  .transaction {
    background-color: var(--surface);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .transaction-info {
    flex: 1;
  }

  .transaction-person {
    font-weight: 600;
    font-size: 1.05rem;
    margin-bottom: 4px;
  }

  .transaction-desc {
    color: var(--text-muted);
    font-size: 0.9rem;
  }

  .transaction-amount {
    font-size: 1.2rem;
    font-weight: 600;
    margin-right: 16px;
    text-align: right;
  }

  .btn-delete {
    background: rgba(255, 69, 58, 0.1);
    border: none;
    color: var(--danger);
    width: 36px;
    height: 36px;
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    cursor: pointer;
  }

  .empty-state {
    text-align: center;
    color: var(--text-muted);
    padding: 32px 0;
    font-size: 1rem;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Split Expenses</h1>
    <div class="subtitle">Matúško & Ahmetko</div>
  </header>
  
  <div class="balance-section" id="balanceSection" style="display: none;">
    <div class="balance-title">Current Balance</div>
    <div class="balance-amount" id="balanceAmount">0.00 CZK</div>
    <div class="balance-detail" id="balanceDetail"></div>
  </div>

  <div class="form-section">
    <div class="form-group">
      <label>Who paid?</label>
      <select id="person">
        <option value="Matúško">Matúško</option>
        <option value="Ahmetko">Ahmetko</option>
      </select>
    </div>
    
    <div class="form-group">
      <label>Amount (CZK)</label>
      <input type="number" id="amount" step="0.01" inputmode="decimal" placeholder="0.00">
    </div>
    
    <div class="form-group">
      <label>Description</label>
      <input type="text" id="description" placeholder="What was it for?">
    </div>
    
    <button class="btn btn-primary" onclick="addTransaction()">Add Transaction</button>
  </div>
  
  <div class="transactions-section">
    <div class="section-title">
      <span>History</span>
      <button class="btn-clear" onclick="clearAll()">Clear All</button>
    </div>
    <div id="transactionsList">
      <div class="empty-state">No transactions yet</div>
    </div>
  </div>
</div>

<script>
async function loadTransactions() {
  const res = await fetch('/api/transactions');
  const data = await res.json();
  renderTransactions(data.transactions);
  calculateBalance(data.transactions);
}

function renderTransactions(transactions) {
  const list = document.getElementById('transactionsList');
  
  if (transactions.length === 0) {
    list.innerHTML = '<div class="empty-state">No transactions yet</div>';
    return;
  }
  
  list.innerHTML = transactions.map(t => `
    <div class="transaction">
      <div class="transaction-info">
        <div class="transaction-person">${t.person}</div>
        <div class="transaction-desc">${t.description}</div>
      </div>
      <div class="transaction-amount">${t.amount.toFixed(2)} CZK</div>
      <button class="btn-delete" onclick="deleteTransaction('${t.id}')">✕</button>
    </div>
  `).join('');
}

function calculateBalance(transactions) {
  const matusko = transactions.filter(t => t.person === 'Matúško').reduce((sum, t) => sum + t.amount, 0);
  const ahmetko = transactions.filter(t => t.person === 'Ahmetko').reduce((sum, t) => sum + t.amount, 0);
  
  const total = matusko + ahmetko;
  const half = total / 2;
  const diff = matusko - half;
  
  const section = document.getElementById('balanceSection');
  const amount = document.getElementById('balanceAmount');
  const detail = document.getElementById('balanceDetail');
  
  if (transactions.length === 0) {
    section.style.display = 'none';
    return;
  }
  
  section.style.display = 'block';
  
  if (Math.abs(diff) < 0.01) {
    amount.textContent = '0.00 CZK';
    detail.textContent = 'All settled up!';
    detail.style.color = 'var(--text-muted)';
  } else if (diff > 0) {
    amount.textContent = `${Math.abs(diff).toFixed(2)} CZK`;
    detail.textContent = 'Ahmetko owes Matúško';
    detail.style.color = 'var(--primary)';
  } else {
    amount.textContent = `${Math.abs(diff).toFixed(2)} CZK`;
    detail.textContent = 'Matúško owes Ahmetko';
    detail.style.color = 'var(--primary)';
  }
}

async function addTransaction() {
  const person = document.getElementById('person').value;
  const amount = parseFloat(document.getElementById('amount').value);
  const description = document.getElementById('description').value;
  
  if (!amount || amount <= 0) {
    alert('Please enter a valid amount');
    return;
  }
  
  if (!description.trim()) {
    alert('Please enter a description');
    return;
  }
  
  await fetch('/api/transactions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ person, amount, description })
  });
  
  document.getElementById('amount').value = '';
  document.getElementById('description').value = '';
  
  loadTransactions();
}

async function deleteTransaction(id) {
  await fetch(`/api/transactions/${id}`, { method: 'DELETE' });
  loadTransactions();
}

async function clearAll() {
  if (confirm('Clear all transactions?')) {
    await fetch('/api/transactions', { method: 'DELETE' });
    loadTransactions();
  }
}

loadTransactions();
</script>
</body>
</html>
